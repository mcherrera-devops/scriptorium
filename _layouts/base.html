<!DOCTYPE html>
<html lang="es">
{% include head.html %}
<style>
  .sketch-btn {
    font-family: "Comic Neue", "Patrick Hand", system-ui, sans-serif;
    font-size: 1rem;
    padding: 0.6em 1.4em;
    background: transparent;
    color: #222;
    border: 3px double #222;
    border-radius: 2px 4px 2px 0;
    /* irregular */
    cursor: pointer;
    margin-top: 1rem;
    /* efecto dibujo */
    box-shadow:
      2px 2px 0 #222,
      3px 3px 0 #222;

    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .sketch-btn:hover {
    box-shadow:
      1px 1px 0 #222,
      2px 2px 0 #222;
  }

  .sketch-btn:active {
    box-shadow:
      1px 1px 0 #222;
  }

  @media (max-width: 600px) {
    .sketch-btn {
      margin-left: 15px;
    }
  }
</style>

<body class="layout-base">
  {% include header.html %}
  <main class="container">
    <div class="hero text-center">
    </div><!-- end hero -->
    <button class="sketch-btn" onclick="netlifyIdentity.open()" id="login-btn">
      Iniciar sesión
    </button>
    <button class="sketch-btn" id="logout-btn" style="display:none;">
      Cerrar sesión
    </button>

    <p id="welcome-msg" style="display:none; margin-top:1rem;"></p>

    {% include menu.html %}
    <div class="content">
      {{ content }}
    </div>
  </main><!-- end container-->
  {% if page.comments %}
  {% include comments.html %}
  {% endif %}
  {% include footer.html %}
  <script src="{{ '/assets/js/clipboard.js' | relative_url }}?v={{ site.github.build_revision }}"></script>
  <script src="{{ '/assets/js/clearfix.js' | relative_url }}?v={{ site.github.build_revision }}"></script>
  <script src=" {{ '/assets/js/codepen.js' | relative_url }}?v={{ site.github.build_revision }}"></script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const loginBtn = document.getElementById("login-btn");
      const logoutBtn = document.getElementById("logout-btn");
      const welcomeMsg = document.getElementById("welcome-msg");

      if (!window.netlifyIdentity) {
        console.error("Netlify Identity no cargó");
        return;
      }

      netlifyIdentity.on("init", user => {
        updateUI(user);
      });

      netlifyIdentity.on("login", user => {
        updateUI(user);
        netlifyIdentity.close();
      });

      netlifyIdentity.on("logout", () => {
        updateUI(null);
      });

      loginBtn.addEventListener("click", () => {
        netlifyIdentity.open();
      });

      logoutBtn.addEventListener("click", () => {
        netlifyIdentity.logout();
      });

      function updateUI(user) {
        if (user) {
          loginBtn.style.display = "none";
          logoutBtn.style.display = "inline-block";
          welcomeMsg.style.display = "block";
          welcomeMsg.textContent =
            `Bienvenido, ${user.user_metadata.full_name || user.email}`;
        } else {
          loginBtn.style.display = "inline-block";
          logoutBtn.style.display = "none";
          welcomeMsg.style.display = "none";
          welcomeMsg.textContent = "";
        }
      }
    });
  </script>


</body>

</html>
