<!DOCTYPE html>
<html lang="es">
{% include head.html %}
<style>
  .sketch-btn {
    font-family: "Comic Neue", "Patrick Hand", system-ui, sans-serif;
    font-size: 1rem;
    padding: 0.6em 1.4em;
    background: transparent;
    color: #222;
    border: 3px double #222;
    border-radius: 2px 4px 2px 0;
    /* irregular */
    cursor: pointer;
    margin-top: 1rem;
    /* efecto dibujo */
    box-shadow:
      2px 2px 0 #222,
      3px 3px 0 #222;

    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .sketch-btn:hover {
    box-shadow:
      1px 1px 0 #222,
      2px 2px 0 #222;
  }

  .sketch-btn:active {
    box-shadow:
      1px 1px 0 #222;
  }
</style>

<body class="layout-base">
  {% include header.html %}
  <main class="container">
    <div class="hero text-center">
    </div><!-- end hero -->
    <button class="sketch-btn" onclick="netlifyIdentity.open()">
      Iniciar sesión
    </button>
    {% include menu.html %}
    <div class="content">
      {{ content }}
    </div>
  </main><!-- end container-->
  {% if page.comments %}
  {% include comments.html %}
  {% endif %}
  {% include footer.html %}
  <script src="{{ '/assets/js/clipboard.js' | relative_url }}?v={{ site.github.build_revision }}"></script>
  <script src="{{ '/assets/js/clearfix.js' | relative_url }}?v={{ site.github.build_revision }}""></script>
  <script src=" {{ '/assets/js/codepen.js' | relative_url }}?v={{ site.github.build_revision }}""></script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</body>

</html>
